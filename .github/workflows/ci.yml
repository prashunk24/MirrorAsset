name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  frontend-check:
    name: Frontend TypeScript & Lint Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps --cache .npm_cache

      - name: TypeScript Compile Check
        run: npx tsc -b

  contract-test:
    name: Soroban Contract Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Ubuntu System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config build-essential

      - name: Set up Rust Toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: wasm32v1-none
          components: rust-src

      - name: Run Unit Tests
        run: cargo test
        working-directory: contracts/mirror_vault

  contract-build:
    name: Soroban Contract Compilation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Ubuntu System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config build-essential

      - name: Set up Rust Toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: wasm32v1-none
          components: rust-src

      - name: Install Prebuilt Stellar CLI
        uses: stellar/stellar-cli@v27.0.0

      - name: Build Optimized WASM Contract
        run: cargo build --target wasm32v1-none --release
        working-directory: contracts/mirror_vault
